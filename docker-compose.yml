services:
  sim:
    build:
      context: .
      dockerfile: Dockerfile.sim
    ports:
      - "8000:8000"
    volumes:
      - ./sim:/app/sim
      - ./server:/app/server
    command: uvicorn server.ws:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=
    depends_on:
      - sim
